phases:
  - type: spike
    duration: 60s
    from: 20
    to: 300
    spikeAt: 20s
    spikeDuration: 10s

target:
  method: GET
  url: http://localhost:8080

maxConcurrency: 400
saturationPolicy: drop

reporting:
  interval: 1s

thresholds:
  maxDroppedRate: 0.05
  errorRate: 0.05
  maxMeanLatency: 500ms
