name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.3

      - name: Go version
        run: go version

      - name: Run tests
        run: go test ./...

      - name: Run vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
